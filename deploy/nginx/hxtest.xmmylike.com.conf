server {
    listen 80;
    listen [::]:80;
    server_name hxtest.xmmylike.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hxtest.xmmylike.com;

    # 正式部署时请替换为 certbot 或其他证书工具生成的实际路径
    ssl_certificate     /etc/letsencrypt/live/hxtest.xmmylike.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hxtest.xmmylike.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
